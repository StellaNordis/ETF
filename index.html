<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ETF-Ausschüttungs-Tool</title>
<style>
:root{--bg:#0f1117;--surface:#181c25;--surface2:#1e2230;--border:#2a2f40;--accent:#3b82f6;--accentDim:#1d3557;--text:#e2e8f0;--muted:#64748b;--dim:#94a3b8;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--assumBg:#2a2a1e;--assumBorder:#4a4a28;--assumText:#a0a060;--histBg:#2d1f4e;--histBorder:#8b5cf6}
*{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text)}
.wrap{min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:2}
.logo{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:15px;flex-shrink:0}
.title{font-weight:700;font-size:16px;line-height:1.1}
.subtitle{font-size:12px;color:var(--muted);margin-top:2px}
.layout{display:grid;grid-template-columns:1fr;gap:0}
.sidebar,.main{padding:16px}
.sidebar{background:var(--surface);border-bottom:1px solid var(--border)}
.label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:block}
textarea,input[type=date]{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-size:14px;outline:none}
textarea{height:160px;resize:vertical;font-family:monospace;line-height:1.5}
.btn{width:100%;padding:12px 0;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:700;margin-top:8px}
.btn2{background:var(--surface2);border:1px solid var(--border);color:var(--dim)}
.btn3{background:transparent;border:1px dashed var(--border);color:var(--muted)}
.cardgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px}
.cardlbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;font-weight:600}
.cardval{font-size:19px;font-weight:800;font-family:monospace}
.tablewrap{overflow:auto;background:var(--surface);border:1px solid var(--border);border-radius:12px}
table{width:100%;border-collapse:collapse;min-width:900px;font-size:13px}
th,td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap}
th{background:var(--surface2);font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);text-align:left}
td.num,th.num{text-align:right;font-family:monospace}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.confirmed{background:#0f2d1a;color:#86efac;border:1px solid #16a34a}.assumption{background:var(--assumBg);color:var(--assumText);border:1px solid var(--assumBorder)}.missing{background:#2d2000;color:#fcd34d;border:1px dashed #b45309}.error{background:#2d1111;color:#fca5a5;border:1px solid var(--red)}
.errorbox{background:#2d1111;border:1px solid var(--red);border-radius:10px;padding:12px 14px;color:#fca5a5;margin-bottom:14px;font-size:13px}
.empty{padding:56px 18px;text-align:center;color:var(--muted)}
.legend{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-top:12px}
.legendrow{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--dim);margin-bottom:6px}
.legendbox{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.modebox{margin-top:12px;border-radius:10px;padding:12px 14px;font-size:12px;line-height:1.5}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:-3px}
@keyframes spin{to{transform:rotate(360deg)}}
.progress{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin:10px 0 0}
.progress>div{height:100%;background:var(--accent);width:0%}
@media (min-width: 900px){.layout{grid-template-columns:320px 1fr}.sidebar{border-right:1px solid var(--border);border-bottom:none;min-height:calc(100vh - 60px)}.cardgrid{grid-template-columns:repeat(4,minmax(0,1fr))}.main{padding:22px 24px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">₿</div>
    <div>
      <div class="title">ETF Ausschüttungs-Planer</div>
      <div class="subtitle">Mobilfreundliche Web-App · Prognose & Historisch</div>
    </div>
  </div>
  <div class="layout">
    <aside class="sidebar">
      <div>
        <label class="label">WKN & Anteile</label>
        <textarea id="input" placeholder="A0F5UH | 120\nA1JX52 | 85\nDBX1MW | 200"></textarea>
      </div>
      <div style="margin-top:12px">
        <label class="label">Stichtag</label>
        <input id="date" type="date" />
      </div>
      <div id="loading" style="display:none"><div class="progress"><div id="bar"></div></div><div style="margin-top:8px;color:var(--dim);font-size:13px"><span class="spin"></span> Lade Daten …</div></div>
      <button class="btn" id="build">Tabelle bauen</button>
      <button class="btn btn2" id="demo">Demo-Daten einfügen</button>
      <button class="btn btn3" id="clear">Eingabe leeren</button>
      <div id="modeBox" class="modebox" style="display:none"></div>
      <div class="legend">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px">Legende</div>
        <div class="legendrow"><div class="legendbox" style="background:var(--surface2);border:1px solid var(--green)"></div>Bestätigte Ausschüttung</div>
        <div class="legendrow"><div class="legendbox" style="background:var(--assumBg);border:1px solid var(--assumBorder)"></div>Annahme / Vorjahreswert (grau)</div>
        <div class="legendrow" style="margin-bottom:0"><div class="legendbox" style="background:var(--surface2);border:1px dashed var(--amber)"></div>Unvollständige Daten</div>
      </div>
    </aside>
    <main class="main">
      <div id="error"></div>
      <div id="summary"></div>
      <div id="out"></div>
    </main>
  </div>
</div>
<script>
const today=()=>new Date().toISOString().split('T')[0];
const isForecastMode=d=>d>=today();
const fmtDate=s=>{if(!s)return'–';const m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);return m?`${m[3]}.${m[2]}.${m[1]}`:s};
const fmtEur=v=>{if(v==null||isNaN(v))return'–';return v.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'};
function parseInput(raw){return raw.split(/\r?\n/).flatMap(line=>{const t=line.trim();if(!t)return[];const m=t.match(/^([A-Z0-9]{6})\s*[|,;\t ]\s*(\d+(?:[.,]\d+)?)$/i);if(!m)return[];const count=parseFloat(m[2].replace(',','.'));return isNaN(count)||count<=0?[]:[{wkn:m[1].toUpperCase(),count}]})}
function extractJSON(text){const t=text.trim();try{return JSON.parse(t)}catch(_){}const fence=t.match(/```(?:json)?\s*([\s\S]*?)```/i);if(fence){try{return JSON.parse(fence[1].trim())}catch(_){}}const a0=t.indexOf('['),a1=t.lastIndexOf(']');if(a0!==-1&&a1>a0){try{return JSON.parse(t.slice(a0,a1+1))}catch(_){}}const o0=t.indexOf('{'),o1=t.lastIndexOf('}');if(o0!==-1&&o1>o0){try{return [JSON.parse(t.slice(o0,o1+1))]}catch(_){}}throw new Error(`JSON-Parsing fehlgeschlagen. Modell antwortete: "${t.slice(0,150)}"`)}
async function fetchETFData(entries,cutoffDate,forecastMode){const wknList=entries.map(e=>`${e.wkn} (${e.count} Anteile)`).join(', ');const modeDesc=forecastMode?`PROGNOSEMODUS: Zeige alle erwarteten Ausschüttungen der nächsten 365 Tage ab ${cutoffDate}. Wo keine bestätigten Daten: Vorjahreswert als Annahme, isAssumption=true.`:`HISTORISCHER MODUS / QUALITY GATE: Stichtag ${cutoffDate} liegt in der Vergangenheit. Nur tatsächlich erfolgte Ausschüttungen bis zu diesem Datum ausgeben. Keine Schätzungen. Fehlende Daten → isIncomplete=true, nextDistributions=[].`;const userPrompt=`Analysiere diese ETF-WKNs und liefere Ausschüttungsdaten:\n\nWKNs: ${wknList}\nStichtag: ${cutoffDate}\n${modeDesc}\n\nGib NUR ein JSON-Array zurück (kein Text davor/danach, keine Markdown-Blöcke):\n[{"wkn":"A0F5UH","name":"iShares Core MSCI World","currentPrice":92.45,"currency":"EUR","nextDistributions":[{"date":"2025-06-15","amountPerShare":0.42,"isConfirmed":true,"isAssumption":false}],"isIncomplete":false,"error":null,"notes":null}]\n\nRegeln:\n- Ein Objekt pro WKN, auch bei Fehler\n- currentPrice: letzter bekannter Kurs in EUR\n- Thesaurierende ETFs: nextDistributions=[], notes="Thesaurierend"\n- Unbekannte WKN: error="WKN nicht auflösbar", nextDistributions=[]\n- isAssumption=true für Schätzungen/Vorjahreswerte\n- isIncomplete=true wenn keine Daten verfügbar`;const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true','x-api-key':''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},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:4000,system:'Du bist eine Finanz-Daten-API. Antworte AUSSCHLIESSLICH mit einem validen JSON-Array. Kein Text, keine Backticks, keine Erklärungen. Nur das Array beginnend mit [ und endend mit ].',messages:[{role:'user',content:userPrompt}]})});if(!res.ok){let msg=`HTTP ${res.status}`;try{const b=await res.json();msg=b?.error?.message||JSON.stringify(b).slice(0,200)}catch(_){}throw new Error(msg)}const data=await res.json();if(data.type==='error'||data.error)throw new Error(data.error?.message||'API-Fehler');if(!Array.isArray(data.content))throw new Error(`Unerwartetes Format: ${JSON.stringify(data).slice(0,150)}`);const raw=data.content.filter(b=>b.type==='text').map(b=>b.text).join('').trim();if(!raw)throw new Error('Leere Antwort vom Modell.');return extractJSON(raw)}
function Tag(type){const labels={confirmed:'✓ Bestätigt',assumption:'⚠ Annahme',missing:'⚡ Unvollständig',error:'Fehler'};return `<span class="tag ${type}">${labels[type]}</span>`}
const input=document.getElementById('input'),date=document.getElementById('date'),loading=document.getElementById('loading'),bar=document.getElementById('bar'),err=document.getElementById('error'),summary=document.getElementById('summary'),out=document.getElementById('out'),modeBox=document.getElementById('modeBox');date.value=today();
document.getElementById('demo').onclick=()=>{input.value='A0F5UH | 120\nA1JX52 | 85\nETF110 | 200\nDBX1MW | 60\nA2PKXG | 150';date.value=today()};document.getElementById('clear').onclick=()=>{input.value='';err.innerHTML='';summary.innerHTML='';out.innerHTML='';modeBox.style.display='none'};
document.getElementById('build').onclick=async()=>{err.innerHTML='';summary.innerHTML='';out.innerHTML='';modeBox.style.display='none';const entries=parseInput(input.value);if(!input.value.trim())return err.innerHTML='<div class="errorbox"><strong>⚠️ Fehler</strong><div style="margin-top:4px">Keine Eingabe. WKNs und Anteile einfügen.</div></div>';if(!entries.length)return err.innerHTML='<div class="errorbox"><strong>⚠️ Fehler</strong><div style="margin-top:4px">Format nicht erkannt. Erwartet: WKN | Anzahl — z.B. A0F5UH | 120</div></div>';if(!date.value)return err.innerHTML='<div class="errorbox"><strong>⚠️ Fehler</strong><div style="margin-top:4px">Bitte einen Stichtag wählen.</div></div>';const forecast=isForecastMode(date.value);modeBox.style.display='block';modeBox.style.background=forecast?getComputedStyle(document.documentElement).getPropertyValue('--accentDim'):getComputedStyle(document.documentElement).getPropertyValue('--histBg');modeBox.style.border='1px solid '+(forecast?getComputedStyle(document.documentElement).getPropertyValue('--accent'):getComputedStyle(document.documentElement).getPropertyValue('--histBorder'));modeBox.innerHTML='<strong>'+(forecast?'🔭 Prognosemodus':'📜 Historischer Modus · Quality Gate')+'</strong><div style="color:var(--muted);margin-top:3px">'+(forecast?`Ausschüttungen der nächsten 365 Tage ab ${fmtDate(date.value)}. Nicht bestätigte Werte sind grau markiert.`:`Nur tatsächlich erfolgte Ausschüttungen bis ${fmtDate(date.value)}. Keine Schätzungen.`)+'</div>';loading.style.display='block';bar.style.width='10%';try{bar.style.width='30%';const etfData=await fetchETFData(entries,date.value,forecast);bar.style.width='85%';const countMap=Object.fromEntries(entries.map(e=>[e.wkn,e.count]));let totalPayout=0,distCount=0;let html='<div class="cardgrid">';let built=[];for(const etf of etfData){const count=countMap[etf.wkn]||0;if(etf.error){built.push({type:'error',wkn:etf.wkn,count,msg:etf.error});continue}const dists=etf.nextDistributions||[];if(!dists.length){built.push({type:'nodist',wkn:etf.wkn,name:etf.name,price:etf.currentPrice,count,notes:etf.notes,isIncomplete:etf.isIncomplete});continue}for(const d of dists){const sum=(d.amountPerShare||0)*count;totalPayout+=isNaN(sum)?0:sum;distCount++;built.push({type:'dist',wkn:etf.wkn,name:etf.name,price:etf.currentPrice,count,d,sum,isAssumption:d.isAssumption,isIncomplete:etf.isIncomplete})}}html+=`<div class="card"><div class="cardlbl">ETFs</div><div class="cardval" style="color:var(--accent)">${etfData.filter(e=>!e.error).length}</div></div><div class="card"><div class="cardlbl">Ausschüttungen</div><div class="cardval">${distCount}</div></div><div class="card"><div class="cardlbl">Gesamt erwartet</div><div class="cardval" style="color:var(--green);font-size:17px">${fmtEur(totalPayout)}</div></div><div class="card"><div class="cardlbl">Modus</div><div class="cardval" style="font-size:13px;margin-top:4px">${forecast?'🔭 Prognose':'📜 Historisch'}</div></div></div>`;summary.innerHTML=html;let table='<div class="tablewrap"><table><thead><tr><th>WKN</th><th>Name</th><th class="num">Kurs</th><th>Ex-Datum</th><th class="num">Betrag/Anteil</th><th class="num">Anteile</th><th class="num">Summe</th><th>Status</th></tr></thead><tbody>';for(const row of built){const rowBg=row.isAssumption?'background:var(--assumBg)':'';if(row.type==='error'){table+=`<tr style="background:#1a0f0f"><td style="font-family:monospace;color:var(--muted);font-size:12px">${row.wkn}</td><td colspan="6" style="color:var(--red);font-size:12px">⚠️ ${row.msg}</td><td>${Tag('error')}</td></tr>`;continue}if(row.type==='nodist'){table+=`<tr style="opacity:${row.isIncomplete?0.7:1}"><td style="font-family:monospace;color:var(--muted);font-size:12px">${row.wkn}</td><td style="font-weight:500">${row.name||'–'}</td><td class="num">${row.price?fmtEur(row.price):'–'}</td><td>–</td><td class="num">–</td><td c
