<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ETF Finder</title>
  <style>
    :root { --bg:#0b1220; --card:#111827; --line:#243043; --text:#e5e7eb; --muted:#94a3b8; --blue:#2563eb; --gray:#334155; --red:#b91c1c; }
    * { box-sizing:border-box; }
    body { margin:0; padding:20px; font-family:system-ui,-apple-system,Arial,sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width: 900px; margin: 0 auto; }
    h1 { margin:0 0 8px; font-size: 28px; }
    p { margin:0 0 16px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:16px; }
    label { display:block; margin:12px 0 6px; color:#cbd5e1; font-size:14px; }
    input, textarea, button { width:100%; border-radius:12px; border:1px solid #334155; background:#0f172a; color:var(--text); padding:12px 14px; font-size:16px; }
    textarea { min-height:88px; resize:vertical; }
    button { cursor:pointer; border:none; font-weight:600; margin-top:10px; }
    button.primary { background:var(--blue); }
    button.secondary { background:var(--gray); }
    button.danger { background:var(--red); }
    .grid { display:grid; grid-template-columns:1fr; gap:12px; }
    .row { display:grid; grid-template-columns:1fr; gap:12px; }
    .top-actions { display:flex; gap:10px; flex-wrap:wrap; }
    .top-actions button { width:auto; padding:10px 14px; }
    ul { list-style:none; padding:0; margin:10px 0 0; }
    li { display:flex; justify-content:space-between; gap:12px; align-items:center; border:1px solid var(--line); background:#0f172a; border-radius:12px; padding:10px 12px; margin-top:8px; }
    .muted { color:var(--muted); font-size:13px; }
    .small { font-size:13px; }
    pre { white-space:pre-wrap; word-break:break-word; background:#0f172a; border:1px solid var(--line); border-radius:12px; padding:12px; min-height:64px; }
    @media (min-width: 760px) { .grid, .row { grid-template-columns:1fr 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>ETF Finder</h1>
    <p class="muted">ETF-/Anteilsdaten bleiben frei einfügbar. Website-URLs werden dauerhaft im Browser gespeichert und serverseitig geprüft.</p>

    <div class="card">
      <div class="grid">
        <div>
          <label for="etfInput">ETF / WKN / Name</label>
          <textarea id="etfInput" placeholder="z. B. A0X8Y4, iShares Core MSCI World..."></textarea>
        </div>
        <div>
          <label for="sharesInput">Anteile / Stück / Gewichtung</label>
          <textarea id="sharesInput" placeholder="z. B. 200, 50%, 12,5 ..."></textarea>
        </div>
      </div>
      <div class="row">
        <div>
          <label for="websiteInput">Website-URL hinzufügen</label>
          <input id="websiteInput" type="url" placeholder="https://example.com/ausschüttung" />
        </div>
        <div style="display:flex; align-items:end; gap:10px;">
          <button id="addWebsiteBtn" class="primary">Website speichern</button>
        </div>
      </div>

      <div class="top-actions" style="margin-top:12px;">
        <button id="buildBtn" class="primary">Prüfung bauen</button>
        <button id="loadDemoBtn" class="secondary">Demo-Daten einfügen</button>
        <button id="clearAllBtn" class="danger">Alles löschen</button>
      </div>
    </div>

    <div class="card">
      <h2 style="margin-top:0; font-size:20px;">Gespeicherte Websites</h2>
      <div class="muted small">Diese Liste bleibt auf diesem Gerät erhalten.</div>
      <ul id="websiteList"></ul>
    </div>

    <div class="card">
      <h2 style="margin-top:0; font-size:20px;">Ergebnis</h2>
      <pre id="out">Noch keine Prüfung gestartet.</pre>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'etf_sites_v1';
    const etfInput = document.getElementById('etfInput');
    const sharesInput = document.getElementById('sharesInput');
    const websiteInput = document.getElementById('websiteInput');
    const websiteList = document.getElementById('websiteList');
    const out = document.getElementById('out');

    function getSites() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveSites(sites) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sites));
    }

    function normalizeUrl(url) {
      return String(url || '').trim();
    }

    function addSite(url) {
      const clean = normalizeUrl(url);
      if (!clean) return;
      const sites = getSites();
      if (!sites.includes(clean)) {
        sites.push(clean);
        saveSites(sites);
      }
      renderSites();
    }

    function removeSite(index) {
      const sites = getSites();
      sites.splice(index, 1);
      saveSites(sites);
      renderSites();
    }

    function renderSites() {
      const sites = getSites();
      websiteList.innerHTML = '';
      if (!sites.length) {
        websiteList.innerHTML = '<li><span class="muted">Noch keine Website gespeichert.</span></li>';
        return;
      }
      sites.forEach((site, index) => {
        const li = document.createElement('li');
        const left = document.createElement('div');
        left.innerHTML = '<div>' + site + '</div><div class="muted small">gespeichert im Browser</div>';
        const btn = document.createElement('button');
        btn.textContent = 'Entfernen';
        btn.className = 'secondary';
        btn.style.width = 'auto';
        btn.style.padding = '8px 12px';
        btn.onclick = () => removeSite(index);
        li.appendChild(left);
        li.appendChild(btn);
        websiteList.appendChild(li);
      });
    }

    async function checkSites() {
      const sites = getSites();
      const etfText = etfInput.value.trim();
      const sharesText = sharesInput.value.trim();

      out.textContent =
        'ETF:\\n' + (etfText || '(leer)') + '\\n\\n' +
        'Anteile:\\n' + (sharesText || '(leer)') + '\\n\\n' +
        'Websites:\\n' + (sites.length ? sites.map(s => '- ' + s).join('\\n') : '(keine gespeichert)') + '\\n\\n' +
        'Prüfung läuft...';

      if (!sites.length) return;

      const results = [];
      for (const site of sites) {
        try {
          const res = await fetch('/api/check', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: site })
          });
          const data = await res.json();
          results.push(
            `${site} -> ${data.ok ? 'OK' : 'Fehler'} (${data.status || 'n/a'})` +
            `${data.title ? ' | ' + data.title : ''}` +
            `${data.keywords?.length ? ' | Treffer: ' + data.keywords.join(', ') : ''}`
          );
        } catch (e) {
          results.push(`${site} -> API-Fehler`);
        }
      }

      out.textContent += '\\n\\nErgebnis:\\n' + results.join('\\n');
    }

    document.getElementById('addWebsiteBtn').addEventListener('click', () => {
      addSite(websiteInput.value);
      websiteInput.value = '';
      websiteInput.focus();
    });

    document.getElementById('buildBtn').addEventListener('click', checkSites);

    document.getElementById('loadDemoBtn').addEventListener('click', () => {
      etfInput.value = 'A0X8Y4, iShares Core MSCI World';
      sharesInput.value = '200';
      addSite('https://example.com');
      addSite('https://www.example.org');
      out.textContent = 'Demo-Daten eingefügt.';
    });

    document.getElementById('clearAllBtn').addEventListener('click', () => {
      localStorage.removeItem(STORAGE_KEY);
      etfInput.value = '';
      sharesInput.value = '';
      websiteInput.value = '';
      out.textContent = 'Alles gelöscht.';
      renderSites();
    });

    websiteInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        addSite(websiteInput.value);
        websiteInput.value = '';
      }
    });

    renderSites();
  </script>
</body>
</html>
